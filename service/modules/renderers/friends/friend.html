<div class="friend">
	<div class="left">
		{{ if .DarkDataURL }}
			<img class="light" src="{{ .LightDataURL }}">
			<img class="dark" src="{{ .DarkDataURL }}">
		{{ else }}
			<img src="{{ .LightDataURL }}">
		{{ end }}
	</div>
	<div class="right">
		<p><a rel="nofollow" href="{{.URL}}" target="_blank"><b>{{.Name}}</b></a></p>
		<p>{{.Description}}</p>
	</div>
</div>
